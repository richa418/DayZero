<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayZero | Choose Your Path</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="role-container">
        <h1>Select Your First 90-Day Challenge</h1>
        <div class="role-grid">
            <div class="role-card" onclick="selectRole('Frontend')">
                <div class="icon">💻</div>
                <h2>Frontend Developer</h2>
                <p>Build the interface, handle state, and perfect the UI.</p>
                <button>Start Sprint</button>
            </div>
            <div class="role-card" onclick="selectRole('Backend')">
                <div class="icon">⚙️</div>
                <h2>Backend Developer</h2>
                <p>Design APIs, manage databases, and scale the logic.</p>
                <button>Start Sprint</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
